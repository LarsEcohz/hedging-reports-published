  .cover-body {

    padding: 80px 0 40px;

  .cover-headline {
    font-family: var(--display);

  .cover-headline .accent { display: block; }
  .cover-sub {
    margin-top: 32px;
    font-family: var(--body);
    font-size: 17px;
    line-height: 1.5;
    color: var(--off-white);
    opacity: 0.85;
    max-width: 540px;
  }
  .cover-graphic {
    display: flex;
    align-items: center;
    justify-content: center;

  .cover-meta {

  .cover-meta .col .label {

  /* SECTIONS */

  .section-num {
    font-family: var(--body);

    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--soft-black);

  .section-title {
    font-family: var(--display);
    font-weight: 375;

    letter-spacing: -0.015em;
    color: var(--soft-black);

  /* Book bar */

    margin: 20px 0 36px;

    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 36px;
    align-items: center;

    color: var(--soft-black);

    font-size: 22px;
    font-weight: 375;

  .book-bar .pill {
    font-family: var(--body);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 8px 14px;
    color: var(--off-white);

  /* KPI strip */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--soft-black);
    border-bottom: 1px solid var(--soft-black);

  .kpi-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
  .kpi-grid.cols-5 .kpi { padding: 28px 18px 26px; }
  .kpi-grid.cols-5 .kpi-value { font-size: 42px; }

  .kpi-grid.cols-6 .kpi { padding: 26px 16px 24px; }
  .kpi-grid.cols-6 .kpi-value { font-size: 34px; letter-spacing: -0.015em; }
  .kpi-grid.cols-6 .kpi-value .unit { font-size: 13px; margin-left: 4px; }
  .kpi-grid.cols-6 .kpi-foot { font-size: 11px; }
  .kpi {
    padding: 32px 24px 30px;
    border-right: 1px solid var(--grey-light);
    display: flex;
    flex-direction: column;
    gap: 12px;

  .kpi:last-child { border-right: none; }
  .kpi-label {
    font-family: var(--body);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--soft-black);
    opacity: 0.6;
    font-weight: 700;

  .kpi-value {
    font-family: var(--display);
    font-weight: 375;
    font-size: 56px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--soft-black);

  .kpi-value .unit {
    font-size: 16px;
    font-weight: 400;
    color: var(--soft-black);
    opacity: 0.6;
    margin-left: 6px;

  .kpi-foot {

  .card {

    font-size: 22px;

    color: var(--soft-black);

  .card-sub {
    font-family: var(--body);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--soft-black);
    opacity: 0.6;
    font-weight: 700;
    text-align: right;

  .chart-wrap { position: relative; height: 320px; }
  .chart-wrap.tall { height: 380px; }
  .chart-wrap.xtall { height: 460px; }

  /* Tables */
  table.fin {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--body);
    font-size: 13px;
  }
  table.fin th, table.fin td {
    padding: 12px 8px;
    text-align: right;
    border-bottom: 1px solid var(--grey-light);
  }
  table.fin th:first-child, table.fin td:first-child { text-align: left; }
  table.fin thead th {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--soft-black);
    opacity: 0.6;
    font-weight: 700;
    border-bottom: 1px solid var(--soft-black);
  }
  table.fin tbody tr:last-child td { border-bottom: 1px solid var(--soft-black); }
  table.fin tr.total td { font-weight: 700; color: var(--soft-black); }
  table.fin .num { font-variant-numeric: tabular-nums; }
  table.fin .muted { color: var(--soft-black); opacity: 0.4; }

  /* Hedge list */
  .hedge-list { margin-top: 24px; }
  .hedge-row {
    display: grid;
    grid-template-columns: 100px 70px 1fr 180px 70px 110px 120px;
    gap: 16px;
    padding: 18px 0;
    align-items: center;
    border-bottom: 1px solid var(--grey-light);
    font-family: var(--body);
    font-size: 12px;
  }
  .hedge-row.header {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--soft-black);
    opacity: 0.6;
    border-bottom: 1px solid var(--soft-black);
    padding-bottom: 12px;
    font-weight: 700;
  }
  .hedge-row .prod { font-family: var(--body); font-size: 13px; color: var(--soft-black); }
  .hedge-row .num { text-align: right; font-variant-numeric: tabular-nums; }

  .chip {
    display: inline-block;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--off-white);
  }
  .chip.blue { background: var(--blue); }
  .chip.green { background: var(--green); }
  .chip.year { background: var(--grey-soft); color: var(--soft-black); }

  /* Footer */
  footer {
    margin-top: 96px;
    background: var(--soft-black);
    color: var(--off-white);
    padding: 56px 90px;

  .footer-inner {
    max-width: 1320px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 32px;

  footer .foot-title {
    font-family: var(--display);
    font-size: 22px;
    color: var(--off-white);
    font-weight: 375;
    letter-spacing: -0.01em;

    font-family: var(--body);

  @media print {

  .gate-title {
    font-family: var(--display);
    font-weight: 375;
    font-size: 32px;

    letter-spacing: -0.015em;

  .gate-sub {

  .gate-form { display: flex; flex-direction: column; gap: 12px; }
  .gate-input {

    font-size: 16px;
    background: transparent;
    border: none;

  .gate-input:focus {

  .gate-btn {
    font-family: var(--body);

    text-transform: uppercase;
    font-weight: 700;
    padding: 14px 24px;

    font-size: 12px;

    margin-top: 8px;

  }
  body.unlocked .gate { display: none; }
  body:not(.unlocked) { overflow: hidden; }
</style>
</head>

(function setupGate() {
  const STORAGE_KEY = 'hedging_unlocked_' + (D.access_hash || 'none');
  const gate = document.getElementById('gate');
  const mark = document.getElementById('gate-mark');
  const form = document.getElementById('gate-form');
  const input = document.getElementById('gate-input');
  const errEl = document.getElementById('gate-error');

  // Render Ecohz symbol into gate
  if (mark && D.assets && D.assets.symbol_white) {
    mark.innerHTML = D.assets.symbol_white;
  }

  // No password configured → unlock immediately
  if (!D.access_hash) {
    document.body.classList.add('unlocked');
    return;
  }

  // Already unlocked this session
  try {
    if (sessionStorage.getItem(STORAGE_KEY) === '1') {
      document.body.classList.add('unlocked');
      return;
    }
  } catch (e) { /* sessionStorage blocked — just show the gate every time */ }

  async function sha256Hex(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    const entered = input.value.trim();
    if (!entered) return;
    const h = await sha256Hex(entered);
    if (h === D.access_hash) {
      try { sessionStorage.setItem(STORAGE_KEY, '1'); } catch (e) {}
      document.body.classList.add('unlocked');
    } else {
      errEl.textContent = 'Incorrect code. Please try again.';
      input.value = '';
      input.focus();
    }
  });
})();

    portColors.push(c);
  });
});

Chart.defaults.font.family = "'PP Telegraf', Arial, sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.color = BRAND.softBlack;
Chart.defaults.borderColor = BRAND.greyLight;
const gridOpts = {
  grid: { color: 'rgba(25,25,25,0.06)', drawBorder: false },
  ticks: { color: BRAND.softBlack, font: { family: "'PP Telegraf', Arial, sans-serif", size: 11 } }
};

new Chart(document.getElementById('chartPortfolio'), {
  type: 'bar',
  data: {
    labels: portLabels,
    datasets: [
      { label: 'VWAP (secured)', data: portVwap, backgroundColor: portColors, borderRadius: 0, barThickness: 50 },
      { label: 'ICAP benchmark', data: portBench, backgroundColor: BRAND.softBlack, borderRadius: 0, barThickness: 50 },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 16 } } },
    scales: { x: gridOpts, y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => fmt3(v)+' €' } } }
  }
});

// Portfolio table
let portHTML = '';
bookKeys.forEach(k => {
  years.forEach(y => {
    const ann = D.annual[k][y];
    const bd = D.books[k][y];
    const ratio = ann ? pct(bd.hedged/ann) : '—';
    const annStr = ann ? fmt0(ann) : '—';
    const hasVol = bd.hedged > 0;
    const vwap = hasVol ? fmt3(bd.vwap) : '—';
    const delta = hasVol ? bd.vwap - bench[y] : null;
    const deltaHTML = hasVol
      ? `<span class="badge ${delta>=0?'up':'down'}">${delta>=0?'+':''}${fmt3(delta)}</span>`
      : `<span class="muted">—</span>`;
    portHTML += `<tr><td>${D.books_meta[k].label}</td><td>${y}</td><td class="num">${annStr}</td><td class="num">${fmt0(bd.hedged)}</td><td class="num">${ratio}</td><td class="num">${vwap}</td><td class="num">${fmt3(bench[y])}</td><td class="num">${deltaHTML}</td></tr>`;
  });
});
document.getElementById('tbl-portfolio').innerHTML = portHTML;

// Per-book sections
const sectionsHost = document.getElementById('book-sections');
bookKeys.forEach((k, ki) => {
  const meta = D.books_meta[k];
  const colorName = meta.color || 'blue';
  const colors = colorSet(colorName);
  const slug = k.replace(/[^a-z0-9]/gi, '').toLowerCase();
  const num = String(ki + 2).padStart(2, '0');

  // KPI tiles
  const showUplift = !!meta.show_uplift;
  const colClass = showUplift ? ' cols-6' : '';
  let kpiHTML = `<div class="kpi-grid${colClass}">`;
  years.forEach(y => {
    const ann = D.annual[k][y];
    const bd = D.books[k][y];
    const ratio = ann ? (bd.hedged/ann*100).toFixed(1)+'<span class="unit">%</span>' : '—';
    const label = tmpl(T.kpi_labels.hedge_ratio, { year: y });
    const foot = tmpl(T.kpi_labels.hedge_ratio_foot, { annual: ann ? fmt0(ann) : '—' });
    kpiHTML += `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value">${ratio}</div><div class="kpi-foot">${foot}</div></div>`;
  });
  years.forEach(y => {
    const bd = D.books[k][y];
    const hasVol = bd.hedged > 0;
    const vwap = hasVol ? fmt3(bd.vwap)+'<span class="unit">€/MWh</span>' : '—';
    const label = tmpl(T.kpi_labels.vwap, { year: y });
    let foot = T.kpi_labels.vwap_foot_no_volume;
    if (hasVol) {
      const d = bd.vwap - bench[y];
      const vsbench = tmpl(T.kpi_labels.vwap_foot_vs_bench, { bench: fmt3(bench[y]) });
      foot = `<span class="badge ${d>=0?'up':'down'}">${d>=0?'▲':'▼'} ${fmt3(Math.abs(d))}</span> ${vsbench}`;
    }
    kpiHTML += `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value">${vwap}</div><div class="kpi-foot">${foot}</div></div>`;
  });

  // Uplift tiles — one per year if show_uplift is true
  let totalUplift = 0;
  const upliftPerYear = {};
  years.forEach(y => {
    const bd = D.books[k][y];
    const u = bd.hedged > 0 ? (bd.vwap - bench[y]) * bd.hedged : 0;
    upliftPerYear[y] = u;
    totalUplift += u;
  });
  if (showUplift) {
    years.forEach(y => {
      const bd = D.books[k][y];
      const hasVol = bd.hedged > 0;
      const u = upliftPerYear[y];
      const label = tmpl(T.book_section.uplift_kpi_label, { year: y });
      let valueHTML, footHTML;
      if (!hasVol) {
        valueHTML = '—';
        footHTML = T.kpi_labels.vwap_foot_no_volume;
      } else {
        const sign = u < 0 ? '−' : '';
        const valColor = u >= 0 ? colors.base : '#FF5C38';
        valueHTML = `<span style="color:${valColor}">${sign}€${fmt0(Math.abs(u))}</span>`;
        footHTML = T.book_section.uplift_kpi_foot;
      }
      kpiHTML += `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value">${valueHTML}</div><div class="kpi-foot">${footHTML}</div></div>`;
    });
  }
  kpiHTML += '</div>';

  // ICAP chart markup (only if enabled for this book)
  const showIcap = !!meta.show_icap_chart;
  const icapCard = showIcap ? `
    <div class="card" style="margin-top:32px">
      <div class="card-head">
        <div class="card-title">${T.book_section.icap_title}</div>
        <div class="card-sub">${tmpl(T.book_section.icap_sub, { label: meta.label })}</div>
      </div>
      <div class="chart-wrap xtall"><canvas id="${slug}-icap"></canvas></div>
    </div>
  ` : '';

  const sectionLabel = tmpl(T.book_section.section_label, { n: num });
  const sectionTitleHTML = emify(tmpl(T.book_section.title_html, { label: meta.label }), 'accent');
  const annualHeaders = T.table_headers.annual.map(h => `<th>${h}</th>`).join('');
  const qHeaders = T.table_headers.quarterly.map(h => `<th>${h}</th>`).join('');

  // Uplift card (only if enabled)
  let upliftCard = '';
  if (showUplift) {
    const upliftHeaders = T.book_section.uplift_table_headers.map(h => `<th>${h}</th>`).join('');
    let upliftRows = '';
    let tVol = 0;
    years.forEach(y => {
      const bd = D.books[k][y];
      const hasVol = bd.hedged > 0;
      if (!hasVol) {
        upliftRows += `<tr><td>${y}</td><td class="num muted">—</td><td class="num muted">—</td><td class="num">${fmt3(bench[y])}</td><td class="num muted">—</td><td class="num muted">—</td></tr>`;
        return;
      }
      const delta = bd.vwap - bench[y];
      const u = upliftPerYear[y];
      upliftRows += `<tr><td>${y}</td><td class="num">${fmt0(bd.hedged)}</td><td class="num">${fmt3(bd.vwap)}</td><td class="num">${fmt3(bench[y])}</td><td class="num">${delta>=0?'+':''}${fmt3(delta)}</td><td class="num">€${fmt0(u)}</td></tr>`;
      tVol += bd.hedged;
    });
    upliftRows += `<tr class="total"><td>Total</td><td class="num">${fmt0(tVol)}</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">€${fmt0(totalUplift)}</td></tr>`;
    upliftCard = `
      <div class="card" style="margin-top:32px">
        <div class="card-head">
          <div class="card-title">${T.book_section.uplift_card_title}</div>
          <div class="card-sub">${tmpl(T.book_section.uplift_card_sub, { label: meta.label })}</div>
        </div>
        <table class="fin">
          <thead><tr>${upliftHeaders}</tr></thead>
          <tbody>${upliftRows}</tbody>
        </table>
      </div>
    `;
  }

  const sec = document.createElement('section');
  sec.innerHTML = `
    <div class="section-head">
      <div class="section-num">${sectionLabel}</div>
      <h2 class="section-title">${sectionTitleHTML}</h2>
    </div>
    <div class="book-bar">
      <div class="tag">${meta.tag}</div>
      <div class="name">${meta.label} · ${meta.subtitle}</div>
      <div class="pill" style="background:${colors.base}">${meta.pill}</div>
    </div>
    ${kpiHTML}
    <div class="grid-2">
      <div class="card">
        <div class="card-head">
          <div class="card-title">${T.book_section.annual_chart_title}</div>
          <div class="card-sub">MWh · ${meta.label}</div>
        </div>
        <div class="chart-wrap tall"><canvas id="${slug}-annual"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title">${T.book_section.annual_table_title}</div>
          <div class="card-sub">${meta.label}</div>
        </div>
        <table class="fin">
          <thead><tr>${annualHeaders}</tr></thead>
          <tbody id="${slug}-tbl-status"></tbody>
        </table>
      </div>
    </div>
    <div class="card" style="margin-top:32px">
      <div class="card-head">
        <div class="card-title">${T.book_section.qstatus_title}</div>
        <div class="card-sub">${tmpl(T.book_section.qstatus_sub, { label: meta.label })}</div>
      </div>
      <table class="fin">
        <thead><tr>${qHeaders}</tr></thead>
        <tbody id="${slug}-tbl-qstatus"></tbody>
      </table>
    </div>
    ${upliftCard}
    <div class="grid-2-eq">
      <div class="card">
        <div class="card-head">
          <div class="card-title">${T.book_section.qvol_title}</div>
          <div class="card-sub">MWh · ${meta.label}</div>
        </div>
        <div class="chart-wrap"><canvas id="${slug}-qvol"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title">${T.book_section.qrev_title}</div>
          <div class="card-sub">EUR · ${meta.label}</div>
        </div>
        <div class="chart-wrap"><canvas id="${slug}-qrev"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-top:32px">
      <div class="card-head">
        <div class="card-title">${T.book_section.vwapq_title}</div>
        <div class="card-sub">EUR / MWh · ${meta.label}</div>
      </div>
      <div class="chart-wrap tall"><canvas id="${slug}-vwapq"></canvas></div>
    </div>
    ${icapCard}
  `;
  sectionsHost.appendChild(sec);

  // Override accent color per book
  sec.querySelectorAll('.section-title .accent').forEach(el => {
    el.style.color = colors.base;
  });

  // Annual status table
  let statusHTML = '';
  let tA = 0, tH = 0;
  years.forEach(y => {
    const ann = D.annual[k][y], hed = D.books[k][y].hedged, rem = ann - hed;
    statusHTML += `<tr><td>${y}</td><td class="num">${fmt0(ann)}</td><td class="num">${fmt0(hed)}</td><td class="num">${fmt0(rem)}</td><td class="num">${ann?pct(hed/ann):'—'}</td></tr>`;
    tA += ann; tH += hed;
  });
  statusHTML += `<tr class="total"><td>Total</td><td class="num">${fmt0(tA)}</td><td class="num">${fmt0(tH)}</td><td class="num">${fmt0(tA-tH)}</td><td class="num">${tA?pct(tH/tA):'—'}</td></tr>`;
  document.getElementById(`${slug}-tbl-status`).innerHTML = statusHTML;

  // Quarterly status table
  let qStatusHTML = '';
  years.forEach(y => {
    const target = D.quarterly_target[k][y];
    let yTotalH = 0;
    for (let qi = 0; qi < 4; qi++) {
      const hed = D.books[k][y].q_vol[qi];
      const rem = Math.max(0, target - hed);
      const ratio = target ? pct(hed/target) : '—';
      const vwap = hed > 0 ? fmt3(D.books[k][y].q_vwap[qi]) : '—';
      qStatusHTML += `<tr><td>${y}</td><td>Q${qi+1}</td><td class="num">${fmt0(target)}</td><td class="num">${fmt0(hed)}</td><td class="num">${fmt0(rem)}</td><td class="num">${ratio}</td><td class="num">${vwap}</td></tr>`;
      yTotalH += hed;
    }
    const yAnnual = D.annual[k][y];
    qStatusHTML += `<tr class="total"><td>${y}</td><td>Total</td><td class="num">${fmt0(yAnnual)}</td><td class="num">${fmt0(yTotalH)}</td><td class="num">${fmt0(Math.max(0,yAnnual-yTotalH))}</td><td class="num">${yAnnual?pct(yTotalH/yAnnual):'—'}</td><td class="num">${yTotalH>0?fmt3(D.books[k][y].vwap):'—'}</td></tr>`;
  });
  document.getElementById(`${slug}-tbl-qstatus`).innerHTML = qStatusHTML;

  // Annual stacked bar
  new Chart(document.getElementById(`${slug}-annual`), {
    type: 'bar',
    data: {
      labels: years.map(String),
      datasets: [
        { label: 'Hedged', data: years.map(y => D.books[k][y].hedged), backgroundColor: colors.base, barThickness: 80 },
        { label: 'Remaining', data: years.map(y => Math.max(0, (D.annual[k][y] || 0) - D.books[k][y].hedged)), backgroundColor: colors.light, barThickness: 80 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 16 } } },
      scales: { x: { ...gridOpts, stacked: true }, y: { ...gridOpts, stacked: true, ticks: { ...gridOpts.ticks, callback: v => fmt0(v) } } }
    }
  });

  // Quarterly volume vs target
  const qVolDatasets = years.map((y, yi) => ({
    type: 'bar',
    label: String(y),
    data: D.books[k][y].q_vol,
    backgroundColor: yi === 0 ? colors.base : colors.bright,
  }));
  years.forEach((y, yi) => {
    const t = D.quarterly_target[k][y];
    if (t > 0) {
      qVolDatasets.push({
        type: 'line',
        label: `${y} target`,
        data: [t, t, t, t],
        borderColor: yi === 0 ? BRAND.softBlack : BRAND.greyDark,
        borderWidth: 1.5,
        borderDash: [5, 4],
        pointRadius: 0,
        fill: false,
        tension: 0,
      });
    }
  });
  new Chart(document.getElementById(`${slug}-qvol`), {
    data: { labels: ['Q1','Q2','Q3','Q4'], datasets: qVolDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 14 } } },
      scales: { x: gridOpts, y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => fmt0(v) } } }
    }
  });

  // Quarterly revenue
  new Chart(document.getElementById(`${slug}-qrev`), {
    type: 'bar',
    data: {
      labels: ['Q1','Q2','Q3','Q4'],
      datasets: years.map((y, yi) => ({
        label: String(y),
        data: D.books[k][y].q_val,
        backgroundColor: yi === 0 ? colors.base : colors.bright,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 16 } } },
      scales: { x: gridOpts, y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => '€'+fmt0(v) } } }
    }
  });

  // VWAP per quarter w/ benchmark
  const allQVwap = [];
  const allQLabels = [];
  const allQColors = [];
  years.forEach((y, yi) => {
    D.books[k][y].q_vwap.forEach((v, qi) => {
      allQVwap.push(v);
      allQLabels.push(`${y} Q${qi+1}`);
      allQColors.push(yi === 0 ? colors.base : colors.bright);
    });
  });
  const benchLine = [];
  years.forEach(y => { for (let i = 0; i < 4; i++) benchLine.push(bench[y]); });

  new Chart(document.getElementById(`${slug}-vwapq`), {
    data: {
      labels: allQLabels,
      datasets: [
        { type: 'bar', label: 'VWAP per quarter', data: allQVwap, backgroundColor: allQColors },
        { type: 'line', label: 'Benchmark', data: benchLine, borderColor: BRAND.softBlack, borderWidth: 2, borderDash: [6, 4], pointRadius: 0, fill: false, tension: 0 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 16 } } },
      scales: { x: gridOpts, y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => fmt3(v)+' €' } } }
    }
  });

  // ICAP time series — raw weekly prices per vintage (only if enabled)
  if (showIcap) {
    const icapDatasets = years.map((y, yi) => {
      const c = yi === 0 ? colors.base : colors.bright;
      return {
        label: `${y} ICAP price`,
        data: D.icap_ts[`p${y}`],
        borderColor: c,
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        pointRadius: 3,
        pointBackgroundColor: c,
        tension: .25,
        fill: false,
      };
    });

    new Chart(document.getElementById(`${slug}-icap`), {
      type: 'line',
      data: { labels: D.icap_ts.dates, datasets: icapDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, boxHeight: 12, padding: 14 } } },
        scales: { x: gridOpts, y: { ...gridOpts, ticks: { ...gridOpts.ticks, callback: v => fmt2(v)+' €' } } }
      }
    });
  }
});

// Hedge list
let hedgeHTML = '';
const sortedHedges = [...D.hedges].sort((a, b) =>
  a.book.localeCompare(b.book) || a.year - b.year || a.production_range.localeCompare(b.production_range)
);
sortedHedges.forEach(h => {
  const colorName = (D.books_meta[h.book] && D.books_meta[h.book].color) || 'blue';
  hedgeHTML += `<div class="hedge-row">
    <div><span class="chip ${colorName}">${h.book}</span></div>
    <div><span class="chip year">${h.year}</span></div>
    <div class="prod">${h.product}</div>
    <div class="num">${h.production_range}</div>
    <div class="num">${fmt3(h.price)}</div>
    <div class="num">${fmt0(h.volume)}</div>
    <div class="num">${fmt2(h.value)}</div>
  </div>`;
});
document.getElementById('hedge-rows').innerHTML = hedgeHTML;
</script>
</body>
</html>
